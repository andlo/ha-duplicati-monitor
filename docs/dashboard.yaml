# Example dashboard for Duplicati Monitor
#
# Fully generic - zero per-job or per-installation editing needed,
# EXCEPT the `server_urls` map in the "Recent runs" card, which links
# each row to that server's Duplicati web interface. Duplicati never
# sends us its own URL, so there's no way to auto-discover it - fill
# in the map once per server, skip it entirely if you don't want links.
#
# TWO VIEWS (tabs):
# - "Duplicati": plain `masonry` layout - gauge, job counts, status
#   list, size graph, activity log. Each card gets its own
#   reasonably-sized column, auto-balanced by Home Assistant.
# - "Recent runs": the combined run-history table, alone, in a `panel`
#   view - a panel view forces its one card to fill the entire page,
#   which is the simplest and most reliable way to get a full-width
#   card in Home Assistant (no column/grid-span configuration to get
#   right, unlike the `sections` view type - see the note below).
#
# TABLE STYLING: uses `card-mod` (install via HACS > Frontend) to
# force the markdown-rendered <table> to actually fill its card's
# width. This matters because Home Assistant's markdown card strips
# `style` attributes from its own content for security - a raw
# `<table style="width:100%">` inside the markdown itself gets
# silently stripped, confirmed against multiple Home Assistant
# community reports of the same issue. card-mod works around this by
# injecting CSS from outside the sanitized content area.
#
# WHY A SEPARATE PANEL VIEW INSTEAD OF `sections` + grid_options:
# several correctly-configured `sections`-view attempts (matching Home
# Assistant's own documented sizing rules) produced results on a real
# dashboard that didn't match the documentation - unexplained gaps
# between sections, tables staying narrow despite `columns: full`,
# the whole page collapsing to a narrow column. A dedicated `panel`
# view sidesteps all of that: there's no column math, the one card in
# it always fills the page, full stop.
#
# The four "Duplicati Total/OK/Problem/Health" summary entities always
# have the same entity_id regardless of what you named the integration
# during setup (see sensor.py - they deliberately opt out of the usual
# device-name prefix), so they're referenced directly below. Every
# per-job card still filters by `integration: duplicati_monitor`
# rather than guessing entity IDs, since job entities DO still inherit
# your collector's device name.
#
# How to use:
# 1. Install "auto-entities" AND "card-mod" via HACS > Frontend.
# 2. Settings > Dashboards > Add Dashboard > "New dashboard from scratch",
#    or edit an existing one. Switch to YAML mode (⋮ menu > Edit in YAML)
#    and paste everything below.
# 3. Fill in `server_urls` in the "Recent runs" card with your own
#    Duplicati web interface addresses (or leave it empty for no links).
#
# THE EASIEST DRILL-DOWN: Settings > Devices & Services > Duplicati
# Monitor > click any job's device. Home Assistant auto-generates that
# page with every sensor, its history graph, and current value - for
# every job, automatically, with no dashboard editing at all.
# Also: each job has a "Next expected backup" sensor and an "Overdue"
# binary sensor (device_class: problem) - build a Home Assistant
# automation on binary_sensor.*_overdue turning "on" to get alerted
# when a backup silently stops running.

title: Duplicati
views:
  - title: Duplicati
    path: duplicati
    icon: mdi:backup-restore
    cards:
      - type: gauge
        entity: sensor.duplicati_health
        name: Backup health
        min: 0
        max: 100
        severity:
          green: 80
          yellow: 50
          red: 0

      - type: glance
        title: Jobs
        show_state: true
        entities:
          - entity: sensor.duplicati_total
            name: Total
            icon: mdi:counter
          - entity: sensor.duplicati_ok
            name: OK
            icon: mdi:check-circle
          - entity: sensor.duplicati_problem
            name: Problem
            icon: mdi:alert-circle

      # --- One row per job, with last-run New/Modified data and Duration ---
      # Matches each *_status entity to its sibling *_history sensor by
      # entity_id suffix swap (*_status -> *_history) and reads the most
      # recent run (runs[-1], since runs are stored oldest-first). A plain
      # entities card can't show attributes nested inside a list, so this
      # uses a markdown table, same approach as "Recent runs" below.
      - type: markdown
        title: Backup jobs - status
        card_mod:
          style: >
            table { width: 100%; table-layout: fixed; }
            td, th { overflow: hidden; text-overflow: ellipsis; padding: 8px; }
        content: >
          {%- set status_entities =
          integration_entities('duplicati_monitor') | select('match',
          '.*_status$') | list | sort -%}
          {%- if status_entities | length == 0 -%}
          No jobs found.
          {%- else -%}
          {{ "| Job | Status | New data | Modified data | Duration |" }}{{ "\n" }}{{ "|---|---|---|---|---|" }}{%- for se in status_entities -%}
          {%- set he = se | replace('_status', '_history') -%}
          {%- set runs = state_attr(he, 'runs') or [] -%}
          {%- set last = runs[-1] if runs | length > 0 else None -%}
          {%- set job_name = state_attr(se, 'job_name') or se -%}
          {%- set status = states(se) -%}
          {%- set newd = (last.get('size_of_added_files', 0) |
          filesizeformat) if last else "-" -%}
          {%- set modd = (last.get('size_of_modified_files', 0) |
          filesizeformat) if last else "-" -%}
          {%- set total = (last.get('duration_seconds', 0) | int) if last
          else 0 -%}
          {%- set dur = (('%dh %02dm' % (total // 3600, (total % 3600) //
          60)) if total >= 3600 else ('%dm %02ds' % (total // 60, total %
          60))) if last else "-" -%}
          {{ "\n" }}| {{ job_name }} | {{ status }} | {{ newd }} | {{ modd }} | {{ dur }} |
          {%- endfor -%}
          {%- endif -%}

      # --- Every job's total size, on one graph ---
      - type: custom:auto-entities
        card:
          type: history-graph
          title: Total backup size over time
          hours_to_show: 168
        filter:
          include:
            - integration: duplicati_monitor
              entity_id: "*_total_backup_size"

      # --- Combined activity log, all jobs ---
      - type: custom:auto-entities
        card:
          type: logbook
          title: Recent activity (all jobs)
          hours_to_show: 168
        filter:
          include:
            - integration: duplicati_monitor
              entity_id: "*_status"

  # --- Full-page table, all jobs combined, in its own tab ---
  # Merges every job's history into one list sorted newest-first,
  # capped at 25 rows total (not per job) - stays readable no matter
  # how many jobs you have or how much history piles up. Each job's
  # "History" diagnostic sensor must be enabled first (Settings >
  # that job's device > History > gear icon) or its runs won't show
  # up here. Timestamps are shown in your local timezone.
  #
  # Written to survive Home Assistant's own dashboard editor
  # re-serialising this YAML (it rewrites `content: |` to
  # `content: >`, which folds line breaks into spaces before Jinja
  # ever runs) - every newline needed in the *output* is emitted
  # explicitly via {{ "\n" }} rather than relying on a source line
  # break surviving, and `run.get(...)` is used throughout instead of
  # `run.xxx` so older history entries (recorded before a field
  # existed) don't raise instead of just showing blank/"?".
  - title: Recent runs
    path: recent-runs
    icon: mdi:table
    type: panel
    cards:
      - type: markdown
        title: Recent runs (all jobs)
        card_mod:
          style: >
            table { width: 100%; table-layout: fixed; }
            td, th { overflow: hidden; text-overflow: ellipsis; padding: 8px; }
        content: >
          {%- set server_urls = {} -%}
          {%- set history_entities =
          integration_entities('duplicati_monitor') | select('match',
          '.*_history$') | list -%}
          {%- set all_runs = namespace(list=[]) -%}
          {%- for entity_id in history_entities -%}
          {%- for run in (state_attr(entity_id, 'runs') or []) -%}
          {%- set all_runs.list = all_runs.list + [run] -%}
          {%- endfor -%}
          {%- endfor -%}
          {%- set sorted_runs = all_runs.list |
          sort(attribute='recorded_at', reverse=true) -%}
          {%- if sorted_runs | length == 0 -%}
          No runs recorded yet - enable at least one job's History
          sensor under Settings > that job's device > History.
          {%- else -%}
          {{ "| Server | Job | When | Result | Files | New data | Modified data | Duration | W/E |" }}{{ "\n" }}{{ "|---|---|---|---|---|---|---|---|---|" }}{%- for run in sorted_runs[:25] -%}
          {%- set ts = run.get('end_time') or run.get('recorded_at') -%}
          {%- set when = as_local(as_datetime(ts)).strftime('%Y-%m-%d %H:%M')
          if ts else 'unknown' -%}
          {%- set sname = run.get('server_name') or run.get('server_id') or
          "?" -%}
          {%- set surl = server_urls.get(run.get('server_name')) or
          server_urls.get(run.get('server_id')) -%}
          {%- set scell = ("[" ~ sname ~ "](" ~ surl ~ ")") if surl else
          sname -%}
          {%- set total = run.get('duration_seconds', 0) | int -%}
          {%- set dur = ('%dh %02dm' % (total // 3600, (total % 3600) //
          60)) if total >= 3600 else ('%dm %02ds' % (total // 60, total %
          60)) -%}
          {{ "\n" }}| {{ scell }} | {{ run.get('job_name') or run.get('job_id') or "?" }} | {{ when }} | {{ run.get('parsed_result') }} | {{ run.get('examined_files') }} | {{ run.get('size_of_added_files', 0) | filesizeformat }} | {{ run.get('size_of_modified_files', 0) | filesizeformat }} | {{ dur }} | {{ run.get('warnings_count') }}/{{ run.get('errors_count') }} |
          {%- endfor -%}
          {%- endif -%}
