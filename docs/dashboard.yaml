# Example dashboard for Duplicati Monitor
#
# Uses only built-in Home Assistant cards, plus one HACS card
# (`auto-entities`) for the overview - no custom Duplicati-specific
# frontend code to build or maintain.
#
# STRUCTURE: an "Overview" tab listing every job's status, plus one
# extra tab PER JOB with that job's trend graphs and a log table -
# clicking between tabs at the top of the dashboard IS the "drill
# down" (no click-through wiring needed, that's what HA's own view
# tabs already do). Copy the "Fedora - TEST" view block below once per
# job you want a detail tab for, and swap in that job's entity IDs.
#
# Every card filters by `integration: duplicati_monitor`, not by
# entity_id wildcards - a wildcard like "sensor.*_status" also matches
# unrelated entities from other integrations that happen to end in
# "_status" (very common: device trackers, Z-Wave nodes, cameras...).
#
# How to use:
# 1. Install "auto-entities" via HACS > Frontend (search "auto-entities").
# 2. Settings > Dashboards > Add Dashboard > "New dashboard from scratch",
#    or edit an existing one. Switch to YAML mode (⋮ menu > Edit in YAML)
#    and paste everything below.
# 3. For each job's detail tab, replace `sensor.fedora_test_*` with that
#    job's own entity IDs, and duplicate the view block.

title: Duplicati
views:
  - title: Overview
    path: duplicati-overview
    icon: mdi:backup-restore
    cards:
      # One row per job: icon (color-coded by result), name, state.
      # Click a row to open HA's built-in more-info dialog (history +
      # attributes, including log_lines) - works with zero extra config.
      - type: custom:auto-entities
        card:
          type: entities
          title: Backup jobs
        filter:
          include:
            - integration: duplicati_monitor
              entity_id: "*_status"
        sort:
          method: friendly_name

  # --- Detail tab for ONE job - duplicate this whole view per job ---
  - title: Fedora - TEST
    path: duplicati-fedora-test
    icon: mdi:server
    cards:
      - type: custom:auto-entities
        card:
          type: history-graph
          title: Total backup size over time
          hours_to_show: 168
        filter:
          include:
            - integration: duplicati_monitor
              entity_id: "sensor.fedora_test_total_backup_size"

      - type: markdown
        title: Recent runs
        content: |
          {% set runs = state_attr('sensor.fedora_test_history', 'runs') or [] %}
          {% if runs | length == 0 %}
          No runs recorded yet - enable the "History" diagnostic sensor
          for this job first (Settings > this device > History > gear icon).
          {% else %}
          | When | Result | Files | Warnings | Errors |
          |---|---|---|---|---|
          {% for run in runs | reverse %}
          | {{ run.end_time or run.recorded_at }} | {{ run.parsed_result }} | {{ run.examined_files }} | {{ run.warnings_count }} | {{ run.errors_count }} |
          {% endfor %}
          {% endif %}
