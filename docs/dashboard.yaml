# Example dashboard for Duplicati Monitor
#
# Fully generic - zero per-job or per-installation editing needed.
# Uses only built-in Home Assistant cards, plus one HACS card
# (`auto-entities`).
#
# IMPORTANT LESSON FROM A REAL BUG: an earlier version of this file
# hardcoded entity IDs like `sensor.duplicati_jobs_total`, assuming
# the collector device is named "Duplicati" - but that name is
# whatever you typed during setup (e.g. "Duplicati Monitor"), which
# changes the actual entity ID prefix. Every card below now filters by
# `integration: duplicati_monitor` (the fixed domain, never changes)
# instead of guessing entity IDs from a device name.
#
# How to use:
# 1. Install "auto-entities" via HACS > Frontend (search "auto-entities").
# 2. Settings > Dashboards > Add Dashboard > "New dashboard from scratch",
#    or edit an existing one. Switch to YAML mode (⋮ menu > Edit in YAML)
#    and paste everything below. One view, nothing to customise.
#
# THE EASIEST DRILL-DOWN: Settings > Devices & Services > Duplicati
# Monitor > click any job's device. Home Assistant auto-generates that
# page with every sensor, its history graph, and current value - for
# every job, automatically, with no dashboard editing at all.

title: Duplicati
views:
  - title: Duplicati
    path: duplicati
    icon: mdi:backup-restore
    cards:
      # --- Summary numbers ---
      - type: custom:auto-entities
        card:
          type: glance
          title: Summary
          show_state: true
        filter:
          include:
            - integration: duplicati_monitor
              entity_id: "*_jobs_total"
            - integration: duplicati_monitor
              entity_id: "*_jobs_ok"
            - integration: duplicati_monitor
              entity_id: "*_jobs_problem"

      # --- One row per job ---
      - type: custom:auto-entities
        card:
          type: entities
          title: Backup jobs - status
        filter:
          include:
            - integration: duplicati_monitor
              entity_id: "*_status"
        sort:
          method: friendly_name

      # --- Every job's total size, on one graph ---
      - type: custom:auto-entities
        card:
          type: history-graph
          title: Total backup size over time
          hours_to_show: 168
        filter:
          include:
            - integration: duplicati_monitor
              entity_id: "*_total_backup_size"

      # --- Combined activity log, all jobs ---
      - type: custom:auto-entities
        card:
          type: logbook
          title: Recent activity (all jobs)
          hours_to_show: 168
        filter:
          include:
            - integration: duplicati_monitor
              entity_id: "*_status"

      # --- Per-job run log, ALL jobs, no editing needed ever ---
      # Loops over every "_history" sensor this integration has
      # created (integration_entities() looks them up by domain, not
      # by your collector's device name, so this never needs updating
      # as you add/rename jobs). Each job's "History" diagnostic
      # sensor must be enabled first (Settings > that job's device >
      # History > gear icon) or it won't show up here.
      - type: markdown
        title: Recent runs, per job
        content: |
          {%- set history_entities = integration_entities('duplicati_monitor') | select('match', '.*_history$') | list -%}
          {%- if history_entities | length == 0 %}
          No "History" sensors are enabled yet - enable at least one job's
          History sensor under Settings > that job's device > History.
          {%- else %}
          {%- for entity_id in history_entities %}

          ### {{ state_attr(entity_id, 'friendly_name') or entity_id }}
          {%- set runs = state_attr(entity_id, 'runs') or [] %}
          {%- if runs | length == 0 %}
          No runs recorded yet.
          {%- else %}
          | When | Result | Files | Warnings | Errors |
          |---|---|---|---|---|
          {%- for run in runs | reverse -%}
          {{ "\n" }}| {{ run.end_time or run.recorded_at }} | {{ run.parsed_result }} | {{ run.examined_files }} | {{ run.warnings_count }} | {{ run.errors_count }} |
          {%- endfor %}
          {%- endif %}
          {%- endfor %}
          {%- endif %}
